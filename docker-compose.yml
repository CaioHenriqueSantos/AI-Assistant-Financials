services:
  db:
    image: postgres:16-alpine
    container_name: financials-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: financials
      POSTGRES_PASSWORD: financials
      POSTGRES_DB: financials_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: financials-api
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "3001:3001"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: financials-web
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env
    ports:
      - "5173:80"

volumes:
  postgres_data:
